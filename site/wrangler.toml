name = "agentrank-site"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "./dist"

[[d1_databases]]
binding = "DB"
database_name = "agentrank-db"
database_id = "946abec6-5f2b-4177-b1cb-b84769a20883"

# GitHub OAuth — required for maintainer claim flow
# Set via Cloudflare Pages dashboard: Settings > Environment Variables
# Or locally in .dev.vars:
#   GITHUB_CLIENT_ID=your_client_id
#   GITHUB_CLIENT_SECRET=your_client_secret
# Register OAuth app at: https://github.com/settings/developers
# Callback URL: https://agentrank-ai.com/api/auth/github/callback

# Resend — weekly email digest
# Add API key as a Cloudflare secret (not an env var, so it's never in plaintext):
#   wrangler secret put RESEND_API_KEY
# Get your key at: https://resend.com/api-keys
# From address: digest@agentrank-ai.com (must be verified domain in Resend)

# Unsubscribe token signing key (optional — falls back to DASH_TOKEN)
# Recommended: set a dedicated secret so rotating DASH_TOKEN doesn't break unsub links
#   wrangler secret put UNSUB_SECRET

# Cloudflare Analytics API token — enables /admin/analytics to show CF Web Analytics data
# Create at: https://dash.cloudflare.com/profile/api-tokens
# Required permission: Account Analytics: Read
#   wrangler secret put CF_API_TOKEN

# Stripe — payment processing for sponsored listings and Pro API subscriptions
# Use test keys from https://dashboard.stripe.com/test/apikeys
#   wrangler secret put STRIPE_SECRET_KEY
#
# Webhook signing secret — from Stripe dashboard: Developers > Webhooks
# Endpoint URL: https://agentrank-ai.com/api/webhooks/stripe
# Events to send: checkout.session.completed, customer.subscription.deleted,
#                 invoice.payment_failed, invoice.payment_succeeded
#   wrangler secret put STRIPE_WEBHOOK_SECRET
#
# Price IDs — create in Stripe dashboard: Products > (create each product)
# Sponsored listing tiers:
#   wrangler secret put STRIPE_PRICE_SPONSORED_BASIC_MONTHLY
#   wrangler secret put STRIPE_PRICE_SPONSORED_BASIC_ANNUAL
#   wrangler secret put STRIPE_PRICE_SPONSORED_PRO_MONTHLY
#   wrangler secret put STRIPE_PRICE_SPONSORED_PRO_ANNUAL
#   wrangler secret put STRIPE_PRICE_SPONSORED_ENTERPRISE_MONTHLY
#   wrangler secret put STRIPE_PRICE_SPONSORED_ENTERPRISE_ANNUAL
# Pro API tiers:
#   wrangler secret put STRIPE_PRICE_PRO_MONTHLY
#   wrangler secret put STRIPE_PRICE_PRO_ANNUAL
# Verified Publisher tiers:
#   wrangler secret put STRIPE_PRICE_VP_MONTHLY
#   wrangler secret put STRIPE_PRICE_VP_ANNUAL
