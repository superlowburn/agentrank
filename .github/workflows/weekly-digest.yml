name: Weekly Digest Email

on:
  schedule:
    - cron: '0 9 * * 1' # 9am UTC every Monday (after nightly pipeline at 6am)
  workflow_dispatch: # Manual trigger for testing

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Send weekly digest
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.DASH_TOKEN }}" \
            -H "Content-Type: application/json" \
            https://agentrank-ai.com/api/admin/send-digest)

          HTTP_BODY=$(echo "$RESPONSE" | head -n -1)
          HTTP_STATUS=$(echo "$RESPONSE" | tail -n 1)

          echo "HTTP status: $HTTP_STATUS"
          echo "Response: $HTTP_BODY"

          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "ERROR: Digest send failed with HTTP $HTTP_STATUS"
            exit 1
          fi

          SENT=$(echo "$HTTP_BODY" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('sent', 0))")
          TOTAL=$(echo "$HTTP_BODY" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('total', 0))")
          echo "Digest sent: $SENT/$TOTAL subscribers"
