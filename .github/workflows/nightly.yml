name: Nightly Pipeline

on:
  schedule:
    - cron: '0 6 * * *' # 6am UTC daily
  workflow_dispatch: # Manual trigger

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Restore previous DB
        uses: actions/cache/restore@v4
        id: db-cache
        with:
          path: data/agentrank.db
          key: agentrank-db-dummy-key-never-matches
          restore-keys: |
            agentrank-db-

      - name: Check DB state
        run: |
          if [ -f data/agentrank.db ]; then
            echo "DB restored from cache"
            ls -lh data/agentrank.db
          else
            echo "No previous DB found — starting fresh"
          fi

      - name: Determine crawl mode
        id: mode
        run: |
          DOW=$(date +%u) # 1=Monday, 7=Sunday
          if [ ! -f data/agentrank.db ]; then
            echo "No DB found — forcing full crawl"
            echo "mode=full" >> $GITHUB_OUTPUT
          elif [ "$DOW" = "7" ]; then
            echo "mode=full" >> $GITHUB_OUTPUT
          else
            echo "mode=incremental" >> $GITHUB_OUTPUT
          fi

      - name: Crawl
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          CRAWL_MODE: ${{ steps.mode.outputs.mode }}
          GLAMA_MAX_PAGES: '500'
        run: cd crawler && npx tsx src/index.ts
        timeout-minutes: 150

      - name: Score
        run: cd scorer && npx tsx src/index.ts

      - name: Generate D1 seed
        run: npx tsx scripts/seed-d1.ts

      - name: Seed D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          cd site
          npx wrangler d1 execute agentrank-db --remote --file=../scripts/d1-schema.sql
          npx wrangler d1 execute agentrank-db --remote --file=../data/d1-seed.sql

      - name: Build & Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          cd site
          npm run build
          npx wrangler pages deploy dist --commit-dirty=true

      - name: Save DB to cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/agentrank.db
          key: agentrank-db-${{ github.run_id }}
